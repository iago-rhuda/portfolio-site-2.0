<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient (Apple space gray) -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1E24" />
      <stop offset="100%" stop-color="#0F0F12" />
    </linearGradient>
    <!-- Accent Gradient -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7290FF" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
    <!-- Subtle Inner Glow -->
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.2" />
    </linearGradient>
  </defs>

  <!-- Apple squircle background (using high precision coordinates for perfect iOS squircle shape) -->
  <path d="M 128,0 
           C 384,0 512,128 512,128 
           L 512,384 
           C 512,384 384,512 128,512 
           L 128,512 
           C 128,512 0,384 0,384 
           L 0,128 
           C 0,128 128,0 128,0 Z" 
        fill="url(#bg)" />

  <!-- Inner Gloss Layer -->
  <path d="M 128,4 
           C 384,4 508,128 508,128 
           L 508,384 
           C 508,384 384,508 128,508 
           L 128,508 
           C 128,508 4,384 4,384 
           L 4,128 
           C 4,128 128,4 128,4 Z" 
        fill="none" 
        stroke="rgba(255, 255, 255, 0.08)" 
        stroke-width="8" />

  <!-- Monogram Logo (IR) -->
  <g transform="translate(90, 75) scale(0.66)">
    <!-- Letter 'I' (Left stem with a dot) -->
    <!-- Stem -->
    <rect x="70" y="160" width="48" height="240" rx="24" fill="url(#accent)" />
    <!-- Glowing Dot -->
    <circle cx="94" cy="90" r="28" fill="url(#accent)" />
    
    <!-- Letter 'R' (Right side) -->
    <!-- Stem of R -->
    <rect x="190" y="160" width="48" height="240" rx="24" fill="url(#accent)" />
    <!-- Loop of R -->
    <path d="M 230,160 
             H 320 
             C 380,160 410,200 410,250 
             C 410,300 380,340 320,340 
             H 230 Z" 
          fill="none" 
          stroke="url(#accent)" 
          stroke-width="48" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
    <!-- Leg of R -->
    <path d="M 300,320 
             L 390,400" 
          stroke="url(#accent)" 
          stroke-width="48" 
          stroke-linecap="round" />
  </g>
</svg>
